services:
  - type: web
    name: exam-portal
    runtime: docker
    plan: free # Can be changed to 'starter' or higher for production
    envVars:
      - key: DB_URL
        fromDatabase:
          name: exam-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: exam-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: exam-db
          property: password
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: JPA_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JPA_DDL
        value: update
      - key: THYMELEAF_CACHE
        value: "true"

databases:
  - name: exam-db
    plan: free # PostgreSQL managed database
    databaseName: examdb
    user: exam_user
