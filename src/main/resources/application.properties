# ── Database ─────────────────────────────────────────────────────────────
# EXPLICIT ROBUST CONNECTION
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:examdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=5000
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Dipen@3575}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hikari Connection Pool ──
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# ── Server ───────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.address=0.0.0.0

# ── Logging ──
logging.level.org.springframework.web=INFO
logging.level.com.exam=DEBUG

