# ── Database ─────────────────────────────────────────────────────────────
# SAFE-FALLBACK CONNECTION: Added defaults for all variables to prevent NumberFormatException
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:examdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=10000&socketTimeout=60000&autoReconnect=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Dipen@3575}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hikari Connection Pool ──
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=2

# ── JPA / Hibernate ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# ── Logging (DEBUG for DB Issues) ──
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=DEBUG

# ── Server ───────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.forward-headers-strategy=native

