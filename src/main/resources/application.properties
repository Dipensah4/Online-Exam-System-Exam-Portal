# ── Database ─────────────────────────────────────────────────────────────
# Railway provides DATABASE_URL; Spring can use DB_URL as a prefix
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/examdb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Dipen@3575}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# ── JPA / Hibernate ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Auto-detect or specify for Postgres/MySQL
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}

# ── Thymeleaf ────────────────────────────────────────────────────────────
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}

# ── Server ───────────────────────────────────────────────────────────────
# Railway sets the PORT env var automatically
server.port=${PORT:8080}
server.forward-headers-strategy=native

