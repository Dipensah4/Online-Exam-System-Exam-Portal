# ── Database ─────────────────────────────────────────────────────────────
# FINAL ROBUST CONFIG: Handles potential Railway variable issues
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT:3306}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&autoReconnect=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hikari Connection Pool ──
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# ── Server ───────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=native

# ── Logging ──
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=DEBUG
logging.level.com.zaxxer.hikari=INFO

