# ── Database ─────────────────────────────────────────────────────────────
# SUPER-RESILIENT CONNECTION: Uses Railway's full URL if available
# This adds 'jdbc:' prefix to Railway's 'mysql://' URL
spring.datasource.url=jdbc:${MYSQL_URL:mysql://localhost:3306/examdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Dipen@3575}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hikari Connection Pool ──
# Prevents the app from crashing if the database is slightly slow to start
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.maximum-pool-size=10

# ── JPA / Hibernate ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Use a more general dialect or allow auto-detection
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Thymeleaf ────────────────────────────────────────────────────────────
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}

# ── Server ───────────────────────────────────────────────────────────────
# Railway sets the PORT env var automatically
server.port=${PORT:8080}
server.forward-headers-strategy=native

