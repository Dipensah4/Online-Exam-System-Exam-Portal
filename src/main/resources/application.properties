# ── Database ─────────────────────────────────────────────────────────────
# Automatically reconstructs JDBC URL using Railway standard variables
# Added parameters for MySQL 8 compatibility in containerized environments
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:examdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:Dipen@3575}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Use a more general dialect or allow auto-detection
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Thymeleaf ────────────────────────────────────────────────────────────
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}

# ── Server ───────────────────────────────────────────────────────────────
# Railway sets the PORT env var automatically
server.port=${PORT:8080}
server.forward-headers-strategy=native

