# ── Database ─────────────────────────────────────────────────────────────
# Uses Railway's internal networking. 
# We include multiple fallback patterns to catch different Railway versions.
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&autoReconnect=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Use a more general dialect or allow auto-detection
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Thymeleaf ────────────────────────────────────────────────────────────
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}

# ── Server ───────────────────────────────────────────────────────────────
# Railway sets the PORT env var automatically
server.port=${PORT:8080}
server.forward-headers-strategy=native

