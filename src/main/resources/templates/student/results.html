<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Results | ExamPortal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background: white;">
    <div class="global-bg-gradient"></div>
    <div th:replace="~{fragments/navbar :: navbar(activePage='results')}"></div>


    <div class="container" style="max-width: 1200px; margin-top: 2rem;">
        <!-- Removed Back to Dashboard button -->

        <div class="card" style="padding: 0; overflow: hidden;">
            <div style="padding: 1.5rem 2.5rem; border-bottom: 1px solid var(--border); background: #f8fafc; display: flex; justify-content: space-between; align-items: center;">
                <h2 style="font-size: 1.5rem;">My Performance History</h2>
                <div class="badge" style="background: var(--primary); color: white;" th:text="${submissions != null ? submissions.size() : 0} + ' Exams Taken'">0 Exams Taken</div>
            </div>
            
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead style="background: #f1f5f9;">
                        <tr>
                            <th style="padding: 1rem 2.5rem; text-align: left; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">#</th>
                            <th style="padding: 1rem 1rem; text-align: left; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Exam Name</th>
                            <th style="padding: 1rem 1rem; text-align: left; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Score</th>
                            <th style="padding: 1rem 1rem; text-align: left; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Percentage</th>
                            <th style="padding: 1rem 1rem; text-align: left; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Status</th>
                            <th style="padding: 1rem 1rem; text-align: left; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Date</th>
                            <th style="padding: 1rem 2.5rem; text-align: right; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sub, stat : ${submissions}" style="border-bottom: 1px solid var(--border);">
                            <td style="padding: 1rem 2.5rem;" th:text="${stat.index + 1}">1</td>
                            <td style="padding: 1rem 1rem;">
                                <div style="font-weight: 600;" th:text="${sub.exam != null ? sub.exam.title : 'Deleted Exam'}">Mathematics</div>
                                <div style="font-size: 0.8rem; color: var(--text-muted);" th:text="${sub.exam != null ? sub.exam.description : 'This exam is no longer available'}">Basic Arithmetic</div>
                            </td>
                            <td style="padding: 1rem 1rem;"><strong th:text="${sub.score + ' / ' + sub.totalQuestions}">12 / 15</strong></td>
                            <td style="padding: 1rem 1rem;">
                                <div style="display: flex; align-items: center; gap: 0.8rem;">
                                    <div style="width: 60px; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden;">
                                        <div th:style="'width:' + ${sub.percentage} + '%; height:100%; background:var(--primary);'"></div>
                                    </div>
                                    <span style="font-weight: 700; font-size: 0.9rem;" th:text="${#numbers.formatDecimal(sub.percentage, 1, 1) + '%'}">80%</span>
                                </div>
                            </td>
                            <td style="padding: 1rem 1rem;">
                                <span class="badge" 
                                      th:style="${sub.status == 'PASS' ? 'background:#dcfce7;color:#166534;' : 'background:#fee2e2;color:#991b1b;'}"
                                      th:text="${sub.status}">Status</span>
                            </td>
                            <td style="padding: 1rem 1rem; font-size: 0.85rem; color: var(--text-muted);" 
                                th:text="${sub.submittedAt != null ? #temporals.format(sub.submittedAt, 'dd MMM yyyy') : '—'}">01 Jan 2026</td>
                            <td style="padding: 1rem 2.5rem; text-align: right; display: flex; justify-content: flex-end; gap: 0.5rem;">
                                <a th:href="@{'/student/result/' + ${sub.id}}" class="btn btn-primary" style="padding: 0.4rem 1rem; font-size: 0.85rem;">
                                    View Summary
                                </a>
                                <a th:href="@{'/student/review/' + ${sub.id}}" class="btn btn-secondary" style="padding: 0.4rem 1rem; font-size: 0.85rem;">
                                    Review Answers
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${submissions == null or submissions.isEmpty()}">
                            <td colspan="7" style="padding: 3rem; text-align: center; color: #64748b;">
                                <p style="font-size: 1.1rem; margin-bottom: 1rem;">You haven't taken any exams yet.</p>
                                <a href="/student/exams" class="btn btn-primary" style="display: inline-block; padding: 0.75rem 1.5rem; font-weight: 600;">Explore Available Exams</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
