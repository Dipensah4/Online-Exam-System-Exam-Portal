<nav xmlns:th="http://www.thymeleaf.org" th:fragment="navbar(activePage)">
    <div style="display: flex; align-items: center; gap: 0.5rem;">
        <div style="display: flex; gap: 0.25rem; margin-right: 1rem;">
            <button onclick="history.back()" class="btn btn-outline" style="padding: 0.3rem 0.6rem; display: flex; align-items: center; justify-content: center;" title="Undo">
                <img src="https://cdn-icons-png.flaticon.com/512/109/109618.png" width="16" alt="Undo">
            </button>
            <button onclick="history.forward()" class="btn btn-outline" style="padding: 0.3rem 0.6rem; display: flex; align-items: center; justify-content: center;" title="Redo">
                <img src="https://cdn-icons-png.flaticon.com/512/109/109617.png" width="16" alt="Redo">
            </button>
        </div>
        <a class="nav-brand" th:href="${#authorization.expression('hasRole(''ROLE_ADMIN'')') ? '/admin/dashboard' : '/student/dashboard'}" style="margin-left: 0;">
            <span th:text="${#authorization.expression('hasRole(''ROLE_ADMIN'')') ? 'ExamPortal' : 'ExamPortal'}">ExamPortal</span>
        </a>
    </div>

    <style>
        .nav-profile-img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid #fff;
        }
    </style>

    <!-- Admin Links -->
    <div class="nav-links" th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')')}">
        <a href="/">Home</a>
        <a href="/admin/dashboard" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">Dashboard</a>
        <a href="/admin/exams" th:classappend="${activePage == 'exams' ? 'active' : ''}">Exams</a>
        <a href="/admin/questions" th:classappend="${activePage == 'questions' ? 'active' : ''}">Questions</a>
        <a href="/admin/students" th:classappend="${activePage == 'students' ? 'active' : ''}">Students</a>
        <a href="/admin/submissions" th:classappend="${activePage == 'submissions' ? 'active' : ''}">Submissions</a>
        <a href="/admin/profile" th:classappend="${activePage == 'profile' ? 'active' : ''}" style="display: flex; align-items: center; gap: 0.4rem;">
            <img th:src="${#authentication.name != null ? '/profile/photo/' + #authentication.name : 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}" 
                 class="nav-profile-img" alt="User"
                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'"> Profile
        </a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline" style="padding: 0.5rem 1rem;">Logout</button>
        </form>
    </div>

    <!-- Student Links -->
    <div class="nav-links" th:if="${#authorization.expression('hasRole(''ROLE_STUDENT'')')}">
        <a href="/">Home</a>
        <a href="/student/dashboard" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">Dashboard</a>
        <a href="/student/exams" th:classappend="${activePage == 'browse' ? 'active' : ''}">Browse Exams</a>
        <a href="/student/results" th:classappend="${activePage == 'results' ? 'active' : ''}">My Results</a>
        <a href="/student/profile" th:classappend="${activePage == 'profile' ? 'active' : ''}" style="display: flex; align-items: center; gap: 0.4rem;">
            <img th:src="${#authentication.name != null ? '/profile/photo/' + #authentication.name : 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}" 
                 class="nav-profile-img" alt="User"
                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'"> Profile
        </a>
        <form th:action="@{/logout}" method="post" style="display:inline;">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline" style="padding: 0.5rem 1rem;">Logout</button>
        </form>
    </div>

    <!-- Non-logged in links (optional, for index/login/register) -->
    <div class="nav-links" th:if="${#authentication == null or #authentication.principal == 'anonymousUser'}">
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </div>
</nav>
