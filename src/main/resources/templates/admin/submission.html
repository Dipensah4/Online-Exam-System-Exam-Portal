<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submissions | ExamPortal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            background: #f1f5f9; 
        }
        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            flex: 1;
            overflow: hidden;
            gap: 1.5rem;
            padding: 1.5rem 8%;
            box-sizing: border-box;
        }
        .content-area {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            gap: 1.5rem;
            height: 100%;
        }
        .search-container {
            background: white;
            border-radius: 16px;
            padding: 1rem 1.5rem;
            border: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            align-items: center;
            box-shadow: var(--shadow);
        }
        .data-card {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }
        .table-header {
            background: #f8fafc;
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr 1fr 100px;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .table-row {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr 1fr 100px;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
            align-items: center;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .table-row:hover { background: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar(activePage='submissions')}"></div>

    <div class="main-layout fade-in-up">
        <main class="content-area">
            <div class="search-container">
                <div style="font-size: 1.5rem; font-weight: 800; color: var(--slate-900);" th:if="${targetStudent != null}">
                    Submissions for <span th:text="${targetStudent.name}">Student Name</span>
                </div>
                <div style="font-size: 1rem; font-weight: 700; color: var(--text-muted);" th:unless="${targetStudent != null}">Search</div>
                <input type="text" id="subSearch" placeholder="Search by student name, exam, or status..." 
                       style="border: none; padding: 0.5rem; background: transparent; box-shadow: none; flex: 1;">
            </div>

            <div class="data-card">
                <div class="table-header">
                    <div>Student Name</div>
                    <div>Exam Name</div>
                    <div>Score</div>
                    <div>Date Submitted</div>
                    <div style="text-align: right;">Action</div>
                </div>
                
                <div id="subTableBody" style="flex: 1; overflow-y: auto;">
                    <div th:each="sub, stat : ${submissions}" class="table-row">
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="32" alt="Student User" style="border-radius: 50%;">
                            <div>
                                <div style="font-weight: 700; color: var(--text);" th:text="${sub.student != null and sub.student.user != null ? sub.student.user.username : '—'}">Username</div>
                                <div style="font-size: 0.75rem; color: var(--text-muted);" th:text="${sub.student != null ? sub.student.name : '—'}">Name</div>
                            </div>
                        </div>
                        <div style="font-weight: 600;" th:text="${sub.exam != null ? sub.exam.title : '—'}">Exam</div>
                        <div>
                            <span class="badge" 
                                  th:style="${sub.percentage >= 75 ? 'background:#dcfce7;color:#166534;' : (sub.percentage >= 33 ? 'background:#fef3c7;color:#92400e;' : 'background:#fee2e2;color:#991b1b;')}"
                                  th:text="${sub.percentage >= 33 ? 'PASSED' : 'FAILED'}">Status</span>
                            <span style="font-weight: 800; margin-left: 0.5rem; font-size: 0.85rem;" th:text="${#numbers.formatDecimal(sub.percentage, 1, 1) + '%'}">80%</span>
                        </div>
                        <div style="font-size: 0.85rem; color: var(--text-muted);" th:text="${sub.submittedAt != null ? #temporals.format(sub.submittedAt, 'dd MMM yyyy, HH:mm') : '—'}">Date</div>
                        <div style="text-align: right;">
                            <a th:href="@{/admin/submission/{id}(id=${sub.id})}" class="btn hover-bright" style="background: #000; color: white; padding: 0.4rem 0.7rem; font-size: 0.75rem; border-radius: 6px;">
                                View
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
    const searchInput = document.getElementById('subSearch');
    const tableBody = document.getElementById('subTableBody');

    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const rows = tableBody.querySelectorAll('.table-row');
        
        rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(query) ? 'grid' : 'none';
        });
    });
    </script>
</body>
</html>
