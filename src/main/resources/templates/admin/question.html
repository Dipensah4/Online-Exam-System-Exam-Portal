<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Questions | ExamPortal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <style>
        body { 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            background: #f1f5f9; 
        }
        .main-layout {
            display: grid;
            grid-template-columns: 400px 1fr;
            flex: 1;
            overflow: hidden;
            gap: 1.5rem;
            padding: 1.5rem;
            box-sizing: border-box;
        }
        .sidebar {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            background: #f8fafc;
        }
        .sidebar-content {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
        }
        .content-area {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            gap: 1.5rem;
        }
        .filter-container {
            background: white;
            border-radius: 16px;
            padding: 1rem 1.5rem;
            border: 1px solid var(--border);
            display: flex;
            gap: 1.5rem;
            align-items: center;
            box-shadow: var(--shadow);
        }
        .data-card {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--border);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .table-header {
            background: #f8fafc;
            display: grid;
            grid-template-columns: 1fr 100px 80px 120px;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .table-row {
            display: grid;
            grid-template-columns: 1fr 100px 80px 120px;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
            align-items: center;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .table-row:hover { background: #f8fafc; }
        .form-section { margin-bottom: 2rem; }
        .form-section h3 { font-size: 1rem; margin-bottom: 1rem; color: var(--text); font-weight: 700; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar(activePage='questions')}"></div>

    <div class="main-layout fade-in-up">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 style="font-size: 1.25rem; font-weight: 800;">Manage Questions</h2>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem;">Add and manage questions for exams.</p>
            </div>
            <div class="sidebar-content">
                <div class="form-section">
                    <h3>Add Question</h3>
                    <form th:action="@{/admin/add-question}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="form-group">
                            <label style="font-size: 0.75rem;">Target Exam</label>
                            <select name="examId" required style="padding: 0.6rem; font-size: 0.85rem;">
                                <option value="" disabled selected>Select Exam...</option>
                                <option th:each="exam : ${exams}" th:value="${exam.id}" th:text="${exam.title}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label style="font-size: 0.75rem;">Question Text</label>
                            <textarea name="questionText" placeholder="Question content..." rows="3" required style="padding: 0.6rem; font-size: 0.85rem;"></textarea>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.75rem;">
                            <input type="text" name="optionA" placeholder="Option A" required style="padding: 0.6rem; font-size: 0.85rem;">
                            <input type="text" name="optionB" placeholder="Option B" required style="padding: 0.6rem; font-size: 0.85rem;">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem;">
                            <input type="text" name="optionC" placeholder="Option C" style="padding: 0.6rem; font-size: 0.85rem;">
                            <input type="text" name="optionD" placeholder="Option D" style="padding: 0.6rem; font-size: 0.85rem;">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                            <div class="form-group">
                                <label style="font-size: 0.75rem;">Correct Ans</label>
                                <select name="correctAnswer" required style="padding: 0.6rem; font-size: 0.85rem;">
                                    <option value="A">A</option> <option value="B">B</option>
                                    <option value="C">C</option> <option value="D">D</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label style="font-size: 0.75rem;">Difficulty</label>
                                <select name="difficulty" required style="padding: 0.6rem; font-size: 0.85rem;">
                                    <option value="Easy">Easy</option>
                                    <option value="Medium">Medium</option>
                                    <option value="Hard">Hard</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 1rem; border-radius: 10px;">Save Question</button>
                    </form>
                </div>

                <div class="form-section">
                    <h3 style="border-top: 1px solid #f1f5f9; padding-top: 1.5rem;">Import from Excel</h3>
                    <form th:action="@{/admin/import-questions}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <select name="examId" required style="padding: 0.6rem; font-size: 0.85rem; margin-bottom: 1rem;">
                            <option value="" disabled selected>Choose Exam</option>
                            <option th:each="exam : ${exams}" th:value="${exam.id}" th:text="${exam.title}"></option>
                        </select>
                        <input type="file" name="file" accept=".xlsx" required style="font-size: 0.8rem;">
                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; border-radius: 10px;">Upload Excel</button>
                    </form>
                </div>
            </div>
        </aside>

        <main class="content-area">
            <div class="filter-container">
                <div style="display: flex; align-items: center; gap: 0.75rem; flex: 1;">
                    <select id="examFilter" onchange="loadQuestions()" 
                            style="border: none; padding: 0.5rem; background: transparent; font-weight: 600; font-size: 1rem; color: var(--text); cursor: pointer; min-width: 250px;">
                        <option value="-1">All Examination</option>
                        <option th:each="exam : ${exams}" th:value="${exam.id}" th:text="${exam.title}"></option>
                    </select>
                </div>
                <div style="display: flex; align-items: center; gap: 0.75rem; flex: 1; border-left: 1px solid var(--border); padding-left: 1.5rem;">
                    <div style="font-size: 0.9rem; font-weight: 700; color: var(--text-muted);">Search</div>
                    <input type="text" id="questionSearch" placeholder="Search questions..." 
                           oninput="debounceSearch()"
                           style="flex: 1; border: none; padding: 0.5rem; background: transparent; box-shadow: none; outline: none; margin-bottom: 0;">
                </div>
                <div class="badge" style="background: #e2e8f0; color: #475569;">
                    <span id="totalQuestionsCount">0</span> Items
                </div>
            </div>

            <div class="data-card">
                <div class="table-header">
                    <div>Question Text</div>
                    <div>Difficulty</div>
                    <div>Correct Answer</div>
                    <div style="text-align: right;">Action</div>
                </div>
                
                <div id="questionTableBody" style="flex: 1; overflow-y: auto;">
                    <!-- Content loaded via AJAX -->
                </div>
                <div id="noQuestionsRow" style="padding: 8rem; text-align: center; color: var(--text-muted); display: none;">
                    <p>Select an exam to view its questions.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        let searchTimeout;
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadQuestions, 300);
        }

        async function loadQuestions() {
            const select = document.getElementById('examFilter');
            const examId = select.value;
            const searchQueryInput = document.getElementById('questionSearch');
            const searchQuery = searchQueryInput ? searchQueryInput.value : '';
            const tbody = document.getElementById('questionTableBody');
            const noRow = document.getElementById('noQuestionsRow');
            const countEl = document.getElementById('totalQuestionsCount');
            
            if (!examId) return;

            try {
                let url = `/admin/api/questions/search?examId=${examId}&query=${encodeURIComponent(searchQuery)}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`Failed to fetch: ${response.status}`);
                }
                
                const questions = await response.json();
                
                tbody.innerHTML = '';
                if (countEl) countEl.textContent = questions.length;

                if (!questions || questions.length === 0) {
                    noRow.style.display = 'block';
                    noRow.innerHTML = `
                        <p>${searchQuery ? 'No questions matching "<b>' + escapeHtml(searchQuery) + '</b>" found.' : 'No questions found for this exam.'}</p>
                        <div style="margin-top: 1rem;">
                            <button class="btn btn-outline btn-sm" onclick="clearFilters()" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Show All Questions</button>
                        </div>
                    `;
                } else {
                    noRow.style.display = 'none';
                    questions.forEach(q => {
                        const row = document.createElement('div');
                        row.className = 'table-row';
                        row.innerHTML = `
                            <div>
                                <div style="font-weight: 700; color: var(--text);">${escapeHtml(q.questionText || '')}</div>
                                <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem;">
                                    A: ${escapeHtml(q.optionA || '')} | B: ${escapeHtml(q.optionB || '')} 
                                    ${q.optionC ? ' | C: ' + escapeHtml(q.optionC) : ''}
                                    ${q.optionD ? ' | D: ' + escapeHtml(q.optionD) : ''}
                                </div>
                            </div>
                            <div>
                                <span class="badge" style="font-size: 0.7rem; ${getBadgeStyle(q.difficulty)}">${q.difficulty || 'Easy'}</span>
                            </div>
                            <div style="font-weight: 800; color: #000;">${q.correctAnswer || ''}</div>
                            <div style="text-align: right;">
                                <div style="display: flex; gap: 0.4rem; justify-content: flex-end;">
                                    <a href="/admin/edit-question/${q.id}" class="btn btn-outline" style="padding: 0.35rem 0.6rem; font-size: 0.75rem; border-color: var(--primary); color: var(--primary);">Edit</a>
                                    <button type="button" onclick="deleteQuestion(${q.id})" class="btn btn-danger" style="padding: 0.35rem 0.6rem; font-size: 0.75rem;">Del</button>
                                </div>
                            </div>
                        `;
                        tbody.appendChild(row);
                    });
                }
            } catch (error) {
                console.error('Error fetching questions:', error);
                tbody.innerHTML = '';
                noRow.style.display = 'block';
                noRow.innerHTML = '<p style="color:red;">Error loading content. Please try again.</p>';
            }
        }

        async function deleteQuestion(id) {
            if (!confirm('Are you sure you want to delete this question?')) return;
            
            try {
                const response = await fetch(`/admin/api/questions/${id}`, {
                    method: 'DELETE',
                    headers: {
                        [document.querySelector('meta[name="_csrf_header"]').content]: document.querySelector('meta[name="_csrf"]').content
                    }
                });
                
                if (response.ok) {
                    loadQuestions(); // Refresh list and count
                } else {
                    alert('Failed to delete question. Please try again.');
                }
            } catch (error) {
                console.error('Error deleting question:', error);
                alert('An error occurred while deleting.');
            }
        }        

        function clearFilters() {
            document.getElementById('examFilter').value = "-1";
            document.getElementById('questionSearch').value = "";
            loadQuestions();
        }

        function getBadgeStyle(diff) {
            if (diff === 'Hard') return 'background:#fee2e2;color:#991b1b;';
            if (diff === 'Medium') return 'background:#fef3c7;color:#92400e;';
            return 'background:#dcfce7;color:#166534;';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const examId = urlParams.get('examId');
            const select = document.getElementById('examFilter');
            if (examId && select) {
                select.value = examId;
            } else if (select) {
                select.value = "-1"; // Default to All
            }
            loadQuestions();
        });
    </script>
</body>
</html>
