<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Question | ExamPortal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar(activePage='questions')}"></div>


    <div class="container" style="max-width: 700px;">
        <!-- Removed Back to Questions button -->

        <div class="card">
            <h2 style="margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">Edit Question</h2>
            
            <form th:action="@{/admin/edit-question/{id}(id=${question.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label>Target Exam</label>
                    <select name="examId" required>
                        <option th:each="exam : ${exams}" 
                                th:value="${exam.id}" 
                                th:text="${exam.title}"
                                th:selected="${exam.id == question.exam.id}">Exam</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Question Text</label>
                    <textarea name="questionText" placeholder="Enter Question" rows="4" required th:text="${question.questionText}"></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Option A</label>
                        <input type="text" name="optionA" required th:value="${question.optionA}">
                    </div>
                    <div class="form-group">
                        <label>Option B</label>
                        <input type="text" name="optionB" required th:value="${question.optionB}">
                    </div>
                    <div class="form-group">
                        <label>Option C</label>
                        <input type="text" name="optionC" th:value="${question.optionC}">
                    </div>
                    <div class="form-group">
                        <label>Option D</label>
                        <input type="text" name="optionD" th:value="${question.optionD}">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                    <div class="form-group">
                        <label>Correct Answer</label>
                        <select name="correctAnswer" required>
                            <option value="A" th:selected="${question.correctAnswer == 'A'}">Option A</option>
                            <option value="B" th:selected="${question.correctAnswer == 'B'}">Option B</option>
                            <option value="C" th:selected="${question.correctAnswer == 'C'}">Option C</option>
                            <option value="D" th:selected="${question.correctAnswer == 'D'}">Option D</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Difficulty Level</label>
                        <select name="difficulty" required>
                            <option value="Easy" th:selected="${question.difficulty == 'Easy' or question.difficulty == null}">Easy (1 Mark)</option>
                            <option value="Medium" th:selected="${question.difficulty == 'Medium'}">Medium (3 Marks)</option>
                            <option value="Hard" th:selected="${question.difficulty == 'Hard'}">Hard (5 Marks)</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem; padding: 1rem;">
                    Update Question Details
                </button>
            </form>
        </div>
    </div>

</body>
</html>
